version: '3.8'

services:
  # Prima Gul Dashboard Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    
    container_name: prima-gul-dashboard
    
    ports:
      - "3000:3000"
    
    environment:
      NODE_ENV: development
      PORT: 3000
    
    volumes:
      - .:/app
      - /app/node_modules
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    
    networks:
      - prima-gul-network

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: prima-gul-nginx
    
    ports:
      - "80:80"
      - "443:443"
    
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    
    depends_on:
      - app
    
    networks:
      - prima-gul-network
    
    restart: unless-stopped

networks:
  prima-gul-network:
    driver: bridge
